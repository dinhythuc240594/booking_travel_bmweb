<!-- Create Tour Section -->
<div class="content-section" id="create">
    <div class="card">
        <div class="card-header">
            <h5><i class="fas fa-plus-circle"></i> Tạo bài viết mới</h5>
        </div>
        <div class="card-body">
            <form id="articleForm">
                <div class="row">
                    <div class="col-md-8">
                        <div class="mb-3">
                            <label class="form-label">Tiêu đề bài viết *</label>
                            <input type="text" class="form-control" id="articleTitle" placeholder="Nhập tiêu đề..."
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nội dung *</label>
                            <textarea id="articleContent" class="form-control"></textarea>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">Danh mục *</label>
                            <select class="form-select" id="articleCategory" required>
                                <option value="">Chọn danh mục</option>
                                {% for category in categories %}
                                <option value="{{ category.id }}">{{ category.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Địa điểm *</label>
                            <select class="form-select" id="articleLocation" required>
                                <option value="">Chọn địa điểm</option>
                                {% for location in locations %}
                                <option value="{{ location.location_id }}">{{ location.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ảnh đại diện</label>
                            <input type="file" class="form-control" id="articleImage" accept="image/*">
                            <input type="hidden" id="articleImageUrl">
                            <div id="imagePreview" class="mt-2"></div>
                            <small class="text-muted">Ảnh sẽ được upload tự động khi chọn file</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ảnh đi kèm (Nhiều ảnh)</label>
                            <input type="file" class="form-control" id="articleGallery" accept="image/*" multiple>
                            <input type="hidden" id="articleGalleryUrls" value="[]">
                            <div id="galleryPreview" class="d-flex flex-wrap gap-2 mt-2"></div>
                            <small class="text-muted">Có thể chọn nhiều ảnh. Ảnh sẽ được upload tự động</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mô tả ngắn</label>
                            <textarea class="form-control" id="articleDescription" rows="3"
                                placeholder="Mô tả ngắn gọn về bài viết..."></textarea>
                        </div>

                        <!-- <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="articleIsHot">
                                <label class="form-check-label" for="articleIsHot">
                                    <i class="fas fa-fire text-danger"></i> Tin nóng
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="articleIsFeatured">
                                <label class="form-check-label" for="articleIsFeatured">
                                    <i class="fas fa-star text-warning"></i> Tin nổi bật
                                </label>
                            </div>
                        </div> -->

                        <div class="mb-3" style="position: relative;">
                            <label class="form-label">Giá người lớn</label>
                            <input type="text" class="form-control" id="price_per_adult" placeholder="Nhập giá: 500000">
                            <small class="text-muted">Nhập giá theo định dạng: 500000</small>
                        </div>

                        <div class="mb-3" style="position: relative;">
                            <label class="form-label">Giá trẻ em</label>
                            <input type="text" class="form-control" id="price_per_child" placeholder="Nhập giá: 500000">
                            <small class="text-muted">Nhập giá theo định dạng: 500000</small>
                        </div>

                        <div class="mb-3" style="position: relative;">
                            <label class="form-label">Số ngày đi *</label>
                            <input type="number" class="form-control" id="articleDurationDays" placeholder="Ví dụ: 3" min="1" value="1" required>
                            <small class="text-muted">Nhập số ngày đi của tour (ví dụ: 3)</small>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="button" class="btn btn-secondary" id="saveDraftBtn">
                                <i class="fas fa-save"></i> Lưu nháp
                            </button>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-paper-plane"></i> Gửi duyệt
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
