<div class="content-section active" id="dashboard">
    <h5 class="mb-3"><i class="fas fa-chart-line text-primary me-2"></i>Thống kê Tour</h5>
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="stat-card bg-white p-3 rounded shadow-sm border d-flex align-items-center">
                <div class="stat-icon bg-warning text-white rounded p-3 me-3"
                    style="width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-clock fa-lg"></i>
                </div>
                <div class="stat-details">
                    <h3 id="statPending" class="mb-0 font-bold">0</h3>
                    <p class="text-muted small mb-0">Tour Chờ duyệt</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card bg-white p-3 rounded shadow-sm border d-flex align-items-center">
                <div class="stat-icon bg-success text-white rounded p-3 me-3"
                    style="width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-check fa-lg"></i>
                </div>
                <div class="stat-details">
                    <h3 id="statApproved" class="mb-0 font-bold">0</h3>
                    <p class="text-muted small mb-0">Tour Đã duyệt</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card bg-white p-3 rounded shadow-sm border d-flex align-items-center">
                <div class="stat-icon bg-danger text-white rounded p-3 me-3"
                    style="width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-times fa-lg"></i>
                </div>
                <div class="stat-details">
                    <h3 id="statRejected" class="mb-0 font-bold">0</h3>
                    <p class="text-muted small mb-0">Tour Bị từ chối</p>
                </div>
            </div>
        </div>
    </div>

    <h5 class="mb-3 mt-4"><i class="fas fa-calendar-alt text-primary me-2"></i>Thống kê Đặt Tour (Bookings)</h5>
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="stat-card bg-white p-3 rounded shadow-sm border d-flex align-items-center">
                <div class="stat-icon bg-success text-white rounded p-3 me-3"
                    style="width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background-color: #2ecc71 !important;">
                    <i class="fas fa-wallet fa-lg"></i>
                </div>
                <div class="stat-details">
                    <h4 id="statBookingRevenue" class="mb-0 font-bold text-success text-truncate">0đ</h4>
                    <p class="text-muted small mb-0">Doanh thu đạt</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card bg-white p-3 rounded shadow-sm border d-flex align-items-center">
                <div class="stat-icon bg-primary text-white rounded p-3 me-3"
                    style="width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background-color: #3498db !important;">
                    <i class="fas fa-shopping-cart fa-lg"></i>
                </div>
                <div class="stat-details">
                    <h3 id="statBookingTotal" class="mb-0 font-bold text-primary">0</h3>
                    <p class="text-muted small mb-0">Tổng số đặt tour</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card bg-white p-3 rounded shadow-sm border d-flex align-items-center">
                <div class="stat-icon bg-warning text-white rounded p-3 me-3"
                    style="width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background-color: #f1c40f !important;">
                    <i class="fas fa-spinner fa-lg"></i>
                </div>
                <div class="stat-details">
                    <h3 id="statBookingPending" class="mb-0 font-bold text-warning">0</h3>
                    <p class="text-muted small mb-0">Đơn chờ duyệt</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card bg-white p-3 rounded shadow-sm border d-flex align-items-center">
                <div class="stat-icon bg-info text-white rounded p-3 me-3"
                    style="width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background-color: #9b59b6 !important;">
                    <i class="fas fa-check-double fa-lg"></i>
                </div>
                <div class="stat-details">
                    <h3 id="statBookingCompleted" class="mb-0 font-bold" style="color: #9b59b6;">0</h3>
                    <p class="text-muted small mb-0">Đơn hoàn thành</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
